<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/logo.png">
    <title>Spotify - Web Player : Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <div class="navbar">
                <div class="navbar-options" style="opacity: 1;">
                    <i class="fa-solid fa-house"></i>
                    <a href="#" ">Home</a>
                </div>
                <div class="navbar-options">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="#">Search</a>
                </div>
            </div>
            <div class="library">
                <div class="library-icons">
                    <div class="library-options navbar-options">
                   <img src="./assets/library_icon.png" alt="lib-icon">
                    <a href="#">Your Library</a>
                    </div>
                    <div class="icons">
                    <i class="fa-solid fa-plus"></i>
                    <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
                <div class="library-content">
                    <div class="box-1 ht">
                        <div class="box-p1">Create your first playlist</div>
                        <div class="box-p2">It's easy , we'll help you</div>
                        <button class="badge">Create playlist</button>
                    </div>
                    <div class="box-1 ht" >
                         <div class="box-p1">Let's find some podcast to follow</div>
                        <div class="box-p2">We'll keep you updated on new episodes</div>
                        <button class="badge">Browse podcasts</button>
                    </div>
                </div>
                    <div class="extra-info">
                        <div class="p1">
                            <span>Legal</span>
                             <span>Safety & privacy center</span>
                        </div>
                        <div class="p2">
                            <span>Privacy policies</span>
                             <span >Cookies</span>
                             <span>About ads</span>
                        </div>
                        <div class="p3">
                            <span style="color:#FFFFFF">cookies</span>
                            
                        </div>
                    </div>
            </div>

        </div>
        <div class="main-content">main-content</div>
        <div class="music-player">music-player</div>
    </div>
     
</body>
</html>
